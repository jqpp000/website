<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏广告管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 保持原有样式不变 */
        :root {
            --primary: #00a3ff;
            --primary-glow: rgba(0, 163, 255, 0.5);
            --secondary: #7928ca;
            --secondary-glow: rgba(121, 40, 202, 0.5);
            --dark-bg: #0f172a;
            --darker-bg: #0a0f1c;
            --card-bg: rgba(15, 23, 42, 0.85);
            --glass-bg: rgba(15, 23, 42, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 0 15px rgba(0, 163, 255, 0.1);
            --glow-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow);
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(0, 163, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(121, 40, 202, 0.08) 0%, transparent 50%),
                linear-gradient(0deg, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300a3ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: var(--text-primary);
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 1.8rem;
            position: relative;
            padding-bottom: 12px;
            text-shadow: 0 0 10px rgba(0, 163, 255, 0.1);
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* 表格样式增强 - 确保数据展示清晰 */
        .ad-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .ad-table th, .ad-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .ad-table th {
            background-color: var(--card-bg);
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .status-active {
            color: var(--success);
            background-color: rgba(16, 185, 129, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .status-expired {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .status-upcoming {
            color: var(--warning);
            background-color: rgba(245, 158, 11, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .countdown-warning {
            color: var(--warning);
            font-weight: 500;
        }

        .countdown-danger {
            color: var(--danger);
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0081cc;
            box-shadow: var(--glow-shadow);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            transition: var(--transition);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--darker-bg);
            color: var(--text-primary);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar input, .search-bar select {
            flex: 1;
            min-width: 150px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-left: 4px solid var(--success);
            border-radius: 4px;
            box-shadow: var(--shadow);
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification h3 {
            margin: 0 0 5px 0;
            color: var(--success);
        }

        .notification p {
            margin: 0;
            color: var(--text-secondary);
        }

        .step-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .step-indicator {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }

        .step-indicator-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background-color: var(--darker-bg);
            border-radius: 4px;
            position: relative;
        }

        .step-indicator-item::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -10px;
            width: 10px;
            height: 2px;
            background-color: var(--border-color);
        }

        .step-indicator-item:last-child::after {
            display: none;
        }

        .step-indicator-item.active {
            background-color: var(--primary-glow);
            border-color: var(--primary);
        }

        .batch-actions {
            margin-top: 10px;
            padding: 10px;
            background-color: var(--glass-bg);
            border-radius: 4px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-message {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }

        .status-message.loading i {
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message.error {
            color: var(--danger);
        }

        .advanced-toggle {
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .advanced-fields {
            display: none;
            margin-bottom: 15px;
            padding: 15px;
            background-color: var(--darker-bg);
            border-radius: 4px;
        }

        .advanced-fields.active {
            display: block;
        }

        .time-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 背景装饰元素 -->
    <div class="decor-element" style="width: 500px; height: 500px; position: fixed; top: -250px; left: -250px; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); border-radius: 50%; opacity: 0.1; pointer-events: none;"></div>
    <div class="decor-element" style="width: 400px; height: 400px; position: fixed; bottom: -200px; right: -200px; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%); border-radius: 50%; opacity: 0.1; pointer-events: none;"></div>

    <div class="container">
        <h1><i class="fas fa-gamepad"></i> 游戏广告管理系统</h1>
        
        <!-- 服务器时间显示 -->
        <div style="margin-bottom: 15px; color: var(--text-secondary); font-size: 0.9rem;">
            <i class="fas fa-clock"></i> 服务器时间 (UTC+8): <span id="serverTimeDisplay">加载中...</span>
        </div>
        
       <!-- 搜索和筛选区域 -->
<div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索服务器名或特性...">
    <select id="areaFilter">
        <option value="">所有区域</option>
        <option value="top_yellow">黄色区域</option>
        <option value="white_area">白色区域</option>
        <option value="orange_area">橙色区域</option>
        <option value="green_area">绿色区域</option>
    </select>

    
            <select id="statusFilter">
                <option value="">所有状态</option>
                <option value="active">正在进行</option>
                <option value="upcoming">即将开始</option>
                <option value="expired">已过期</option>
            </select>
            <button id="searchBtn" class="btn btn-primary"><i class="fas fa-search"></i> 搜索</button>
            <button id="resetFilterBtn" class="btn"><i class="fas fa-sync-alt"></i> 重置</button>
        </div>
        
        <!-- 操作按钮区域 -->
        <div class="action-buttons">
            <button id="addAdBtn" class="btn btn-primary"><i class="fas fa-plus"></i> 新增广告</button>
            <button id="batchDeleteBtn" class="btn btn-danger" disabled><i class="fas fa-trash-alt"></i> 批量删除</button>
            <button id="batchRenewBtn" class="btn btn-primary" disabled><i class="fas fa-redo"></i> 批量续期</button>
            <button id="refreshBtn" class="btn"><i class="fas fa-sync-alt"></i> 刷新数据</button>
        </div>
        
        <!-- 批量操作提示 -->
        <div class="batch-actions" id="batchActions" style="display: none;">
            <i class="fas fa-info-circle"></i>
            <span>已选择 <span id="selectedCount">0</span> 条广告</span>
        </div>
        
        <!-- 广告数据表格 -->
        <table class="ad-table">
            <thead>
                <tr>
                    <th style="width: 40px;">
                        <input type="checkbox" id="selectAll">
                    </th>
                    <th>ID</th>
                    <th>服务器名</th>
                    <th>区域</th>
                    <th>开始时间 (UTC+8)</th>
                    <th>结束时间 (UTC+8)</th>
                    <th>状态</th>
                    <th>剩余时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="adTableBody">
                <tr><td colspan="9" class="status-message loading"><i class="fas fa-circle-notch fa-spin"></i> 加载广告数据中...</td></tr>
            </tbody>
        </table>
    </div>
    
    <!-- 广告编辑/新增模态框 -->
    <div id="adModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-color);">
                <h2 id="modalTitle"><i class="fas fa-plus"></i> 新增广告</h2>
            </div>
            <div style="padding: 20px;">
                <!-- 步骤指示器 -->
                <div class="step-indicator">
                    <div class="step-indicator-item active" data-step="1">基本信息</div>
                    <div class="step-indicator-item" data-step="2">时间设置</div>
                    <div class="step-indicator-item" data-step="3">高级选项</div>
                    <div class="step-indicator-item" data-step="4">确认</div>
                </div>
                
                <!-- 步骤内容 -->
                <div class="step-content active" data-step="1">
                    <div class="form-group">
                        <label for="serverName">服务器名称 <span style="color: var(--danger);">*</span></label>
                        <input type="text" id="serverName" required placeholder="输入服务器名称">
                    </div>
                    
                    <div class="form-group">
                        <label for="area">区域 <span style="color: var(--danger);">*</span></label>
                        <select id="area" required>
                            <option value="">选择区域</option>
                            <option value="top_yellow">黄色区域</option>
                            <option value="white_area">白色区域</option>
                            <option value="orange_area">橙色区域</option>
                            <option value="green_area">绿色区域</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="batchCount">批量创建数量</label>
                        <input type="number" id="batchCount" min="1" value="1">
                        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px;">
                            如需创建多个连续广告，可设置数量，系统将自动生成序号
                        </div>
                    </div>
                </div>
                
                <div class="step-content" data-step="2">
                    <div class="form-group">
                        <label for="openTime">开始时间 (UTC+8) <span style="color: var(--danger);">*</span></label>
                        <input type="datetime-local" id="openTime" required>
                        <div class="time-preview">本地时间: <span id="openTimeLocal"></span></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="expireTime">结束时间 (UTC+8) <span style="color: var(--danger);">*</span></label>
                        <input type="datetime-local" id="expireTime" required>
                        <div class="time-preview">本地时间: <span id="expireTimeLocal"></span></div>
                    </div>
                    
                    <div class="form-group" id="timeOffsetGroup" style="display: none;">
                        <label for="timeOffset">批量时间间隔（分钟）</label>
                        <input type="number" id="timeOffset" min="1" value="60">
                        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px;">
                            批量创建时，每个广告的开始和结束时间将依次递增此值
                        </div>
                    </div>
                </div>
                
                <div class="step-content" data-step="3">
                    <div class="form-group">
                        <label for="feature">广告特性 <span style="color: var(--danger);">*</span></label>
                        <textarea id="feature" rows="3" required placeholder="描述广告的主要特性和内容"></textarea>
                        <div class="time-preview"><span id="featureLength">0</span> 字符 (最多200字符)</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="expRate">经验倍率</label>
                        <input type="text" id="expRate" placeholder="例如：2x, 1.5x">
                    </div>
                    
                    <div class="form-group">
                        <label for="version">适用版本</label>
                        <input type="text" id="version" placeholder="例如：1.0.0, 2.3.x">
                    </div>
                    
                    <div class="form-group">
                        <label for="homepage">活动页面</label>
                        <input type="url" id="homepage" placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="enableReminder"> 启用过期提醒
                        </label>
                    </div>
                    
                    <div class="form-group" id="reminderTimeGroup" style="display: none;">
                        <label for="reminderTime">提前提醒时间（小时）</label>
                        <input type="number" id="reminderTime" min="1" value="24">
                    </div>
                </div>
                
                <div class="step-content" data-step="4">
                    <div style="background-color: var(--darker-bg); padding: 15px; border-radius: 4px; margin-bottom: 15px;">
                        <h3 style="margin-top: 0; color: var(--primary);">广告信息确认</h3>
                        <table style="width: 100%;">
                            <tr>
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">服务器名称:</td>
                                <td id="confirmServerName" style="padding: 5px 0;"></td>
                            </tr>
                            <tr>
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">区域:</td>
                                <td id="confirmArea" style="padding: 5px 0;"></td>
                            </tr>
                            <tr>
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">开始时间 (UTC+8):</td>
                                <td id="confirmOpenTime" style="padding: 5px 0;"></td>
                            </tr>
                            <tr>
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">结束时间 (UTC+8):</td>
                                <td id="confirmExpireTime" style="padding: 5px 0;"></td>
                            </tr>
                            <tr>
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">广告特性:</td>
                                <td id="confirmFeature" style="padding: 5px 0; word-break: break-all;"></td>
                            </tr>
                            <tr id="confirmBatchRow" style="display: none;">
                                <td style="width: 30%; padding: 5px 0; color: var(--text-secondary);">创建数量:</td>
                                <td id="confirmBatchCount" style="padding: 5px 0;"></td>
                            </tr>
                        </table>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="confirmCheck"> 我已确认以上信息正确无误
                        </label>
                    </div>
                </div>
                
                <!-- 步骤导航按钮 -->
                <div class="step-navigation">
                    <button id="prevStepBtn" class="btn" style="visibility: hidden;"><i class="fas fa-arrow-left"></i> 上一步</button>
                    <div style="flex: 1;"></div>
                    <button id="nextStepBtn" class="btn btn-primary"><i class="fas fa-arrow-right"></i> 下一步</button>
                    <button id="saveAdBtn" class="btn btn-primary" style="display: none;"><i class="fas fa-save"></i> 保存广告</button>
                </div>
            </div>
            <div style="padding: 10px 20px; border-top: 1px solid var(--border-color); text-align: right;">
                <button id="closeModalBtn" class="btn">关闭</button>
            </div>
            <input type="hidden" id="adId">
        </div>
    </div>
    
    <!-- 续期模态框 -->
    <div id="renewModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-color);">
                <h2><i class="fas fa-redo"></i> 广告续期</h2>
            </div>
            <div style="padding: 20px;">
                <div class="form-group">
                    <label for="renewDurationSelect">续期时长</label>
                    <select id="renewDurationSelect" onchange="document.getElementById('customRenewDuration').style.display = this.value === 'custom' ? 'block' : 'none'">
                        <option value="12">12小时</option>
                        <option value="24" selected>24小时</option>
                        <option value="48">48小时</option>
                        <option value="72">72小时</option>
                        <option value="168">7天</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                
                <div class="form-group" id="customRenewDuration" style="display: none;">
                    <label for="customDurationInput">自定义时长（小时）</label>
                    <input type="number" id="customDurationInput" min="1" value="24">
                </div>
                
                <div class="form-group">
                    <label>原过期时间 (UTC+8)</label>
                    <div id="originalExpireTime" style="padding: 8px; background-color: var(--darker-bg); border-radius: 4px;"></div>
                </div>
                
                <div class="form-group">
                    <label>新过期时间 (UTC+8)</label>
                    <div id="newExpireTime" style="padding: 8px; background-color: var(--darker-bg); border-radius: 4px; color: var(--success);"></div>
                </div>
            </div>
            <div style="padding: 10px 20px; border-top: 1px solid var(--border-color); text-align: right;">
                <button id="closeRenewModalBtn" class="btn">取消</button>
                <button id="confirmRenewBtn" class="btn btn-primary">确认续期</button>
            </div>
        </div>
    </div>
    
    <!-- 成功提示通知 -->
    <div id="successNotification" class="notification">
        <h3 id="notificationTitle"></h3>
        <p id="notificationMessage"></p>
    </div>
    
    <script>
        // 全局变量 - 存储从数据库获取的真实数据
        let allAds = [];
        let selectedIds = new Set();
        let currentRenewAdId = null;
        let countdownInterval;
        let serverTimeOffset = 0; // 服务器时间与本地时间的偏移量（毫秒）
        let currentStep = 1;
        
        // API基础地址 - 请替换为您实际的后端API地址
        // 这些API应直接连接到您的数据库进行CRUD操作
        const API_BASE_URL = 'http://localhost:3000/api';

        document.addEventListener('DOMContentLoaded', () => {
            bindEventListeners();
            startServerTimeSync();
            loadUserPreferences();
            loadAdData(); // 从数据库加载真实数据

        // 同步服务器时间 - 确保所有时间计算基于服务器时间(UTC+8)
        async function startServerTimeSync() {
            try {
                // 从服务器获取当前时间(UTC+8)
                const response = await fetch(`${API_BASE_URL}/time`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`获取服务器时间失败: ${response.status}`);
                }
                
                const data = await response.json();
                const serverTime = new Date(data.currentTime).getTime(); // 服务器返回的是UTC+8时间
                const localTime = Date.now();
                
                // 计算时间偏移量
                serverTimeOffset = serverTime - localTime;
                
                // 更新时间显示
                updateServerTimeDisplay();
                
                // 每秒更新一次时间显示
                setInterval(updateServerTimeDisplay, 1000);
                
            } catch (error) {
                console.error('时间同步失败:', error);
                // 同步失败时使用本地时间，但在控制台提示
                console.warn('使用本地时间代替服务器时间，可能导致时间计算不准确');
                updateServerTimeDisplay();
                setInterval(updateServerTimeDisplay, 1000);
            }
        }

        // 保存广告到数据库
        async function saveAd() {
            if (!document.getElementById('confirmCheck').checked) {
                alert('请确认信息无误并勾选确认框');
                return;
            }
            
            if (!validateFeatureLength()) {
                goToPrevStep();
                goToPrevStep();
                document.getElementById('feature').focus();
                return;
            }
            
            // 明确获取并验证区域值
            const areaValue = document.getElementById('area').value;
            if (!areaValue || areaValue.trim() === '') {
                alert('请选择区域');
                goToPrevStep();
                goToPrevStep();
                document.getElementById('area').focus();
                return;
            }
            
            // 验证区域值是否有效
            const validAreas = ['top_yellow', 'white_area', 'orange_area', 'green_area'];
            if (!validAreas.includes(areaValue)) {
                alert('选择的区域无效，请重新选择');
                goToPrevStep();
                goToPrevStep();
                document.getElementById('area').focus();
                return;
            }
            
            const adId = document.getElementById('adId').value;
            const isEdit = !!adId;
            const batchCount = parseInt(document.getElementById('batchCount').value);
            const timeOffset = parseInt(document.getElementById('timeOffset').value);
            
            const serverName = document.getElementById('serverName').value.trim();
            const openTimeStr = document.getElementById('openTime').value.trim();
            const expireTimeStr = document.getElementById('expireTime').value.trim();
            const enableReminder = document.getElementById('enableReminder').checked;
            const reminderTime = document.getElementById('reminderTime').value;
            
            // 转换为UTC+8时间戳
            const baseOpenTime = convertLocalToUTC8(openTimeStr);
            const baseExpireTime = convertLocalToUTC8(expireTimeStr);
            const offsetMs = timeOffset * 60 * 1000;
            
            // 准备要保存到数据库的数据
            const adsData = [];
            for (let i = 0; i < batchCount; i++) {
                const currentOpenTime = baseOpenTime + (i * offsetMs);
                const currentExpireTime = baseExpireTime + (i * offsetMs);
                
                let currentServerName = serverName;
                if (batchCount > 1) {
                    currentServerName = `${serverName}-${i + 1}`;
                }
                
                adsData.push({
                    id: isEdit ? adId : null, // 新建广告时ID由数据库生成
                    server_name: currentServerName,
                    open_time: new Date(currentOpenTime).toISOString(),
                    expire_time: new Date(currentExpireTime).toISOString(),
                    originalOpenTime: currentOpenTime,
                    originalExpireTime: currentExpireTime,
                    feature: document.getElementById('feature').value.trim(),
                    exp_rate: document.getElementById('expRate').value.trim(),
                    version: document.getElementById('version').value.trim(),
                    homepage: document.getElementById('homepage').value.trim(),
                    area: areaValue, // 强制使用验证后的区域值
                    enable_reminder: enableReminder,
                    reminder_time: enableReminder ? reminderTime : null,
                    created_at: new Date(getCurrentServerTime()).toISOString(),
                    updated_at: new Date(getCurrentServerTime()).toISOString()
                });
            }

            // 验证时间范围
            const validation = validateTimeRange();
            if (!validation.isValid) {
                alert('时间设置无效：' + validation.message);
                goToPrevStep();
                return;
            }

            if (!adsData[0].server_name) {
                alert('服务器名不能为空');
                goToPrevStep();
                goToPrevStep();
                document.getElementById('serverName').focus();
                return;
            }
            
            // 加强区域检查逻辑
            if (!adsData[0].area || adsData[0].area.trim() === '') {
                alert('请选择有效的区域');
                goToPrevStep();
                goToPrevStep();
                document.getElementById('area').focus();
                return;
            }
            
            try {
                let response;
                let actionMessage;
                
                if (isEdit) {
                    // 编辑现有广告 - 更新数据库记录
                    response = await fetch(`${API_BASE_URL}/ads/${adId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        },
                        body: JSON.stringify(adsData[0])
                    });
                    actionMessage = "广告更新成功";
                } else {
                    // 添加新广告 - 插入数据库
                    response = await fetch(`${API_BASE_URL}/ads/batch`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        },
                        body: JSON.stringify(adsData)
                    });
                    actionMessage = `成功发布了${batchCount}条新广告`;
                }
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    throw new Error(errorData?.message || `数据库操作失败: ${response.status}`);
                }
                
                // 保存用户偏好设置（本地存储仅用于用户设置，不存储业务数据）
                saveUserPreferences();
                
                // 关闭模态框并刷新数据
                closeModal();
                loadAdData(true);
                
                // 显示成功消息
                showSuccessMessage("操作成功", actionMessage);
                
            } catch (error) {
                console.error('数据库保存失败:', error);
                alert(`数据库操作失败: ${error.message}`);
            }
        }

        // 广告续期 - 更新数据库中的过期时间
        async function confirmRenew() {
            if (!currentRenewAdId) return;
            
            const renewSelect = document.getElementById('renewDurationSelect');
            const duration = renewSelect.value === 'custom'
                ? parseInt(document.getElementById('customDurationInput').value)
                : parseInt(renewSelect.value);
                
            if (!duration || duration <= 0) {
                alert('请输入有效的续期时长');
                return;
            }
            
            const ad = allAds.find(a => a.id == currentRenewAdId);
            if (!ad) {
                alert('未找到广告信息');
                return;
            }
            
            // 计算新的过期时间(UTC+8)
            const currentServerTime = getCurrentServerTime();
            const currentExpireTime = Math.max(ad.originalExpireTime, currentServerTime);
            const newExpireTime = currentExpireTime + (duration * 60 * 60 * 1000);
            
            if (!confirm(`确认将广告续期${duration}小时？\n原过期时间: ${formatUTC8DateTime(ad.originalExpireTime)}\n新过期时间: ${formatUTC8DateTime(newExpireTime)}`)) {
                return;
            }
            
            try {
                // 调用服务器API更新数据库中的过期时间
                const response = await fetch(`${API_BASE_URL}/ads/${currentRenewAdId}/renew`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getAuthToken()
                    },
                    body: JSON.stringify({ 
                        duration_hours: duration,
                        new_expire_time: newExpireTime,
                        updated_at: new Date(currentServerTime).toISOString()
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    throw new Error(errorData?.message || `续期失败: ${response.status}`);
                }
                
                closeRenewModal();
                loadAdData(true);
                showSuccessMessage("续期成功", "广告已成功续期并更新至数据库");
                
            } catch (error) {
                console.error("续期失败：", error);
                alert(`续期失败：${error.message}`);
            }
        }

        // 验证时间范围
        function validateTimeRange() {
            const openTimeStr = document.getElementById('openTime').value;
            const expireTimeStr = document.getElementById('expireTime').value;
            
            if (!openTimeStr || !expireTimeStr) {
                return { isValid: false, message: '请填写完整的时间信息' };
            }
            
            const openTime = convertLocalToUTC8(openTimeStr);
            const expireTime = convertLocalToUTC8(expireTimeStr);
            const currentTime = getCurrentServerTime();
            
            if (openTime >= expireTime) {
                return { isValid: false, message: '开始时间不能晚于结束时间' };
            }
            
            if (expireTime <= currentTime) {
                return { isValid: false, message: '结束时间不能早于当前时间' };
            }
            
            return { isValid: true };
        }

        // 验证特性长度
        function validateFeatureLength() {
            const feature = document.getElementById('feature').value;
            if (feature.length === 0) {
                alert('请填写广告特性');
                return false;
            }
            if (feature.length > 200) {
                alert('广告特性不能超过200个字符');
                return false;
            }
            return true;
        }

        // 步骤导航 - 下一步
        function goToNextStep() {
            if (currentStep === 1 && !document.getElementById('serverName').value.trim()) {
                alert('请输入服务器名称');
                return;
            }
            
            if (currentStep === 1 && !document.getElementById('area').value) {
                alert('请选择区域');
                return;
            }
            
            if (currentStep === 2) {
                const validation = validateTimeRange();
                if (!validation.isValid) {
                    alert('时间设置无效：' + validation.message);
                    return;
                }
            }
            
            if (currentStep === 3) {
                updateConfirmationPage();
            }
            
            document.querySelector(`.step-content[data-step="${currentStep}"]`).classList.remove('active');
            document.querySelector(`.step-indicator-item[data-step="${currentStep}"]`).classList.remove('active');
            
            currentStep++;
            
            document.querySelector(`.step-content[data-step="${currentStep}"]`).classList.add('active');
            document.querySelector(`.step-indicator-item[data-step="${currentStep}"]`).classList.add('active');
            
            updateStepButtons();
        }

        // 步骤导航 - 上一步
        function goToPrevStep() {

            document.querySelector(`.step-indicator-item[data-step="${currentStep}"]`).classList.remove('active');
            
            currentStep--;
            
            document.querySelector(`.step-content[data-step="${currentStep}"]`).classList.add('active');
            document.querySelector(`.step-indicator-item[data-step="${currentStep}"]`).classList.add('active');
            
            updateStepButtons();
        }

        // 更新步骤按钮状态
        function updateStepButtons() {
            document.getElementById('prevStepBtn').style.visibility = currentStep > 1 ? 'visible' : 'hidden';
            
            if (currentStep === 4) {
                document.getElementById('nextStepBtn').style.display = 'none';
                document.getElementById('saveAdBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('nextStepBtn').style.display = 'inline-flex';
                document.getElementById('saveAdBtn').style.display = 'none';
            }
        }

        // 更新确认页面信息
        function updateConfirmationPage() {
            const serverName = document.getElementById('serverName').value.trim();
            const area = document.getElementById('area').value;
            const areaText = getAreaText(area);
            const openTime = document.getElementById('openTime').value;
            const expireTime = document.getElementById('expireTime').value;
            const feature = document.getElementById('feature').value.trim();
            const batchCount = parseInt(document.getElementById('batchCount').value);
            
            document.getElementById('confirmServerName').textContent = serverName;
            document.getElementById('confirmArea').textContent = areaText;
            document.getElementById('confirmOpenTime').textContent = formatDateTimeForDisplay(openTime);
            document.getElementById('confirmExpireTime').textContent = formatDateTimeForDisplay(expireTime);
            document.getElementById('confirmFeature').textContent = feature || '无';
            
            if (batchCount > 1) {
                document.getElementById('confirmBatchRow').style.display = 'table-row';
                document.getElementById('confirmBatchCount').textContent = batchCount;
            } else {
                document.getElementById('confirmBatchRow').style.display = 'none';
            }
        }

        // 渲染广告表格
        function renderAdTable(ads) {
            const tableBody = document.getElementById('adTableBody');
            
            if (ads.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" class="status-message"><i class="fas fa-info-circle"></i> 没有找到匹配的广告数据</td></tr>';
                return;
            }
            
            let html = '';
            ads.forEach(ad => {
                const currentTime = getCurrentServerTime(); // 已同步为UTC+8基准
                let status, statusClass;
                
                // 直接使用UTC+8时间戳比较
                if (ad.originalExpireTime < currentTime) {
                    status = '已过期';
                    statusClass = 'status-expired';
                } else if (ad.originalOpenTime > currentTime) {
                    status = '即将开始';
                    statusClass = 'status-upcoming';
                } else {
                    status = '正在进行';
                    statusClass = 'status-active';
                }
                
                html += `
                <tr>
                    <td><input type="checkbox" class="ad-checkbox" value="${ad.id}" onchange="handleCheckboxChange(this)"></td>
                    <td>${ad.id}</td>
                    <td>${ad.server_name}</td>
                    <td>${getAreaText(ad.area)}</td>
                    <td>${formatUTC8DateTime(ad.originalOpenTime)}</td>
                    <td>${formatUTC8DateTime(ad.originalExpireTime)}</td>
                    <td><span class="${statusClass}">${status}</span></td>
                    <td class="${getCountdownClass(ad)}" id="countdown-${ad.id}">${getCountdownText(ad)}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editAd('${ad.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-primary btn-sm" onclick="openRenewModal('${ad.id}')"><i class="fas fa-redo"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="deleteAd('${ad.id}')"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }

        // 打开续期模态框
        function openRenewModal(adId) {
            currentRenewAdId = adId;
            const ad = allAds.find(a => a.id == adId);
            
            if (ad) {
                document.getElementById('originalExpireTime').textContent = formatUTC8DateTime(ad.originalExpireTime);
                document.getElementById('renewDurationSelect').value = '24';
                document.getElementById('customRenewDuration').style.display = 'none';
                updateNewExpireTimePreview();
            }
            
            document.getElementById('renewModal').classList.add('active');
        }

        // 关闭续期模态框
        function closeRenewModal() {
            currentRenewAdId = null;
            document.getElementById('renewModal').classList.remove('active');
        }

        // 更新新过期时间预览
        function updateNewExpireTimePreview() {
            if (!currentRenewAdId) return;
            
            const ad = allAds.find(a => a.id == currentRenewAdId);
            if (!ad) return;
            
            const renewSelect = document.getElementById('renewDurationSelect');
            const duration = renewSelect.value === 'custom'
                ? parseInt(document.getElementById('customDurationInput').value)
                : parseInt(renewSelect.value);
                
            if (!duration || duration <= 0) return;
            
            const currentServerTime = getCurrentServerTime();
            const currentExpireTime = Math.max(ad.originalExpireTime, currentServerTime);
            const newExpireTime = currentExpireTime + (duration * 60 * 60 * 1000);
            
            document.getElementById('newExpireTime').textContent = formatUTC8DateTime(newExpireTime);
        }

        // 计算新的过期时间
        function calculateNewExpireTime(duration) {
            if (!currentRenewAdId) return { newExpireTime: 0 };
            
            const ad = allAds.find(a => a.id == currentRenewAdId);
            if (!ad) return { newExpireTime: 0 };
            
            const currentServerTime = getCurrentServerTime();
            const currentExpireTime = Math.max(ad.originalExpireTime, currentServerTime);
            const newExpireTime = currentExpireTime + (duration * 60 * 60 * 1000);
            
            return { newExpireTime };
        }

        // 格式化UTC+8日期时间显示
        function formatUTC8DateTime(timestamp) {
            const date = new Date(timestamp);
            // 转换为UTC+8时间
            const utc8Offset = 8 * 60 * 60 * 1000; // UTC+8偏移量（毫秒）
            const utc8Date = new Date(date.getTime() + utc8Offset);
            
            return utc8Date.toISOString().replace('T', ' ').slice(0, 16);
        }

        // 格式化日期时间用于显示
        function formatDateTimeForDisplay(utc8DateTimeStr) {
            if (!utc8DateTimeStr) return '';
            const date = new Date(utc8DateTimeStr);
            return date.toLocaleString() + ' (本地时间)';
        }

        // 格式化日期时间用于输入框
        function formatDateTimeForInput(timestamp) {
            const date = new Date(timestamp);
            // 转换为UTC+8时间
            const utc8Offset = 8 * 60 * 60 * 1000;
            const utc8Date = new Date(date.getTime() + utc8Offset);
            
            const year = utc8Date.getUTCFullYear();
            const month = String(utc8Date.getUTCMonth() + 1).padStart(2, '0');
            const day = String(utc8Date.getUTCDate()).padStart(2, '0');
            const hours = String(utc8Date.getUTCHours()).padStart(2, '0');
            const minutes = String(utc8Date.getUTCMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        // 将本地时间转换为UTC+8时间戳
        function convertLocalToUTC8(localDateTimeStr) {
            if (!localDateTimeStr) return 0;
            const localDate = new Date(localDateTimeStr);
            // 获取本地时间与UTC时间的偏移（分钟）
            const localOffset = localDate.getTimezoneOffset();
            // 转换为UTC+8时间戳（本地时间 + 本地偏移 + 8小时）
            return localDate.getTime() + (localOffset * 60 * 1000) + (8 * 60 * 60 * 1000);
        }

        // 将UTC+8时间转换为本地时间
        function convertUTC8ToLocal(utc8DateTimeStr) {
            if (!utc8DateTimeStr) return 0;
            const utc8Date = new Date(utc8DateTimeStr);
            // 获取本地时间与UTC时间的偏移（分钟）
            const localOffset = utc8Date.getTimezoneOffset();
            // 转换为本地时间戳（UTC+8时间 - 8小时 - 本地偏移）
            return utc8Date.getTime() - (8 * 60 * 60 * 1000) - (localOffset * 60 * 1000);
        }

        // 获取倒计时文本
        function getCountdownText(ad) {
            const currentTime = getCurrentServerTime();
            
            if (ad.originalExpireTime < currentTime) {
                const diff = currentTime - ad.originalExpireTime;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                return `已过期 ${hours}小时`;
            } else if (ad.originalOpenTime > currentTime) {
                const diff = ad.originalOpenTime - currentTime;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                return `还有 ${hours}h${minutes}m 开始`;
            } else {
                const diff = ad.originalExpireTime - currentTime;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                return `剩余 ${hours}h${minutes}m`;
            }
        }

        // 获取倒计时样式类
        function getCountdownClass(ad) {
            const currentTime = getCurrentServerTime();
            
            if (ad.originalExpireTime < currentTime) {
                return '';
            } else if (ad.originalOpenTime > currentTime) {
                return '';
            } else {
                const diff = ad.originalExpireTime - currentTime;
                const hours = diff / (1000 * 60 * 60);
                
                if (hours < 1) {
                    return 'countdown-danger';
                } else if (hours < 24) {
                    return 'countdown-warning';
                }
                return '';
            }
        }

        // 编辑广告
        function editAd(adId) {
            const ad = allAds.find(a => a.id == adId);
            if (!ad) return;
            
            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-edit"></i> 编辑广告 #${adId}`;
            document.getElementById('adId').value = adId;
            
            // 填充表单数据
            document.getElementById('serverName').value = ad.server_name.replace(/-(\d+)$/, '');
            
            // 确保区域值被正确设置
            if (ad.area) {
                document.getElementById('area').value = ad.area;
            } else {
                // 如果广告没有区域值，默认选择第一个有效区域
                document.getElementById('area').value = 'top_yellow';
            }
            
            document.getElementById('batchCount').value = 1;
            document.getElementById('timeOffsetGroup').style.display = 'none';
            
            document.getElementById('openTime').value = formatDateTimeForInput(ad.originalOpenTime);
            document.getElementById('expireTime').value = formatDateTimeForInput(ad.originalExpireTime);
            
            const openLocalTime = new Date(convertUTC8ToLocal(document.getElementById('openTime').value)).toLocaleString();
            const expireLocalTime = new Date(convertUTC8ToLocal(document.getElementById('expireTime').value)).toLocaleString();
            document.getElementById('openTimeLocal').textContent = openLocalTime;
            document.getElementById('expireTimeLocal').textContent = expireLocalTime;
            
            document.getElementById('feature').value = ad.feature || '';
            document.getElementById('featureLength').textContent = (ad.feature || '').length;
            document.getElementById('expRate').value = ad.exp_rate || '';
            document.getElementById('version').value = ad.version || '';
            document.getElementById('homepage').value = ad.homepage || '';
            
            document.getElementById('enableReminder').checked = ad.enable_reminder || false;
            document.getElementById('reminderTime').value = ad.reminder_time || 24;
            document.getElementById('reminderTimeGroup').style.display = (ad.enable_reminder || false) ? 'block' : 'none';
            
            // 重置步骤
            currentStep = 1;
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.step-indicator-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.step-content[data-step="1"]`).classList.add('active');
            document.querySelector(`.step-indicator-item[data-step="1"]`).classList.add('active');
            updateStepButtons();
            
            // 显示模态框
            document.getElementById('adModal').classList.add('active');
        }

        // 打开模态框
        function openModal(adId = null) {
            if (adId) {
                editAd(adId);
                return;
            }
        }
