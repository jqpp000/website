<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>游戏开服表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 保持原有样式，新增表格列宽基础类 */
    .col-15 { width: 15%; }   /* 服务器名/开机时间 */
    .col-42 { width: 42%; }   /* 游戏版本特色介绍 */
    .col-8 { width: 8%; }     /* 经验 */
    .col-10 { width: 10%; }   /* 版本/游戏主页 */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SimHei", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    
    body {
      background-color: #2e220a; /* 表格外容器背景色 - 深棕色 */
      color: #333;
      line-height: 1.5;
    }
    
    a {
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    .btn-enter {
      display: inline-block;
      padding: 2px 6px;
      background-color: #FF6600;
      color: white;
      text-decoration: none;
      border-radius: 2px;
      font-size: 12px;
      font-family: "SimSun", serif;
      border: 1px solid #E55A00;
      font-weight: normal;
    }
    
    .btn-enter:hover {
      background-color: #FF8800;
      color: white;
      text-decoration: none;
    }
    
    .loading {
      text-align: center;
      color: #666;
      padding: 10px;
      font-family: "SimSun", serif;
      font-size: 12px;
      font-weight: normal;
    }
    
    .container-1200 {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 0 10px;
    }
    
    .ad-container {
      padding: 0;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      overflow-x: auto;
    }
    
    .top-info {
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-bottom: none;
      padding: 8px 0;
      text-align: center;
    }
    
    .top-info p {
      color: #333;
      font-weight: bold;
    }
    
    .top-banner {
      background-color: #FFFFFF;
      background-image: url('top-banner.jpg');
      background-size: cover;
      background-position: center;
      border: 1px solid #ddd;
      border-top: none;
      padding: 40px 0;
      min-height: 120px;
    }
    
    .ad-section {
      width: 100%;
      padding: 0;
      border: none;
    }
    
    .section-title {
      color: #C00;
      font-weight: bold;
      padding: 5px 10px;
      font-size: 15px;
      background-color: #FFF0F0;
      border-bottom: 1px solid #FFCCCC;
      margin: 0;
    }
    
    /* 区域背景色定义 */
    .top-yellow {
      background-color: #FFFFE0;
    }
    
    .white-area {
      background-color: #FFFFFF;
    }
    
    .orange-area {
      background-color: #FFF8E0;
    }
    
    .green-area {
      background-color: #E8F5E9;
    }
    
    .server-table {
      width: 100%;
      min-width: 1000px; /* 固定最小宽度 */
      border-collapse: collapse;
      table-layout: fixed; /* 关键：固定布局，确保列宽严格按设定显示 */
      border: none;
    }
    
    .full-table th,
    .full-table td {
      padding: 0 8px;
      text-align: center;
      border: 1px solid #ddd;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
      height: 25px;
      line-height: 25px;
    }
    
    /* 表头背景色 - 使用图片背景 */
    .full-table th {
      background: url(../images1/qq.jpg);
      color: #A84200;
      font-weight: bold !important;
    }
    
    /* 行背景色和鼠标悬停效果 */
    .top-yellow .full-table tr {
      background-color: #FFFF00;
    }
    
    .white-area .full-table tr {
      background-color: #FFFFFF;
    }
    
    .orange-area .full-table tr {
      background-color: #FFFF00;
    }
    
    .green-area .full-table tr {
      background-color: #d6ff52;
    }
    
    /* 鼠标悬停效果 */
    .top-yellow .full-table tr:hover {
      background-color: #B0E0E6;
    }
    
    .white-area .full-table tr:hover,
    .orange-area .full-table tr:hover,
    .green-area .full-table tr:hover {
      background-color: #ffccff;
    }
    
    .server-name {
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    .tag {
      display: inline-block;
      padding: 0 3px;
      margin: 0 2px;
      background-color: #FFFFCC;
      border: 1px dashed #FFCC66;
      font-size: 12px !important;
      font-family: "SimSun", serif !important;
      font-weight: normal !important;
    }
    
    .bottom-banner {
      background-color: #FFFFFF;
      border: 1px solid #ddd;
      border-top: none;
      padding: 10px 0;
      text-align: center;
    }
    
    .bottom-text {
      font-size: 12px;
      color: #666;
      padding: 10px;
    }

    @media (max-width: 768px) {
      .top-banner {
        padding: 20px 0;
      }
      
      .section-title {
        font-size: 14px;
        padding: 5px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container-1200">
    <div class="top-info">
      <p>制作联系QQ: 2653920258 | 奇迹游戏开服表 | 每日更新最新开服信息</p>
    </div>

    <div class="top-banner"></div>

    <div class="ad-container">
      <!-- 01广告区域 - 黄色区域（保留表头） -->
      <div class="ad-section top-yellow">
        <div class="section-title">↓以下为本站强力推荐(20条)长久稳定品牌大区→</div>
        <table class="server-table full-table">
          <thead>
            <tr>
              <th class="col-15">服务器名</th>
              <th class="col-15">开机时间</th>
              <th class="col-42">游戏版本特色介绍</th>
              <th class="col-8">经验</th>
              <th class="col-10">版本</th>
              <th class="col-10">游戏主页</th>
            </tr>
          </thead>
          <tbody id="top-yellow-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 02广告区域 - 白色区域（隐藏表头，保持列宽） -->
      <div class="ad-section white-area">
        <table class="server-table full-table">
          <thead style="display: none;">
            <tr>
              <th class="col-15"></th>
              <th class="col-15"></th>
              <th class="col-42"></th>
              <th class="col-8"></th>
              <th class="col-10"></th>
              <th class="col-10"></th>
            </tr>
          </thead>
          <tbody id="white-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 03广告区域 - 橙色区域（隐藏表头，保持列宽） -->
      <div class="ad-section orange-area">
        <table class="server-table full-table">
          <thead style="display: none;">
            <tr>
              <th class="col-15"></th>
              <th class="col-15"></th>
              <th class="col-42"></th>
              <th class="col-8"></th>
              <th class="col-10"></th>
              <th class="col-10"></th>
            </tr>
          </thead>
          <tbody id="orange-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 04广告区域 - 绿色区域（隐藏表头，保持列宽） -->
      <div class="ad-section green-area">
        <table class="server-table full-table">
          <thead style="display: none;">
            <tr>
              <th class="col-15"></th>
              <th class="col-15"></th>
              <th class="col-42"></th>
              <th class="col-8"></th>
              <th class="col-10"></th>
              <th class="col-10"></th>
            </tr>
          </thead>
          <tbody id="green-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="bottom-banner">
      <div class="bottom-text">
        <p>© 2023 游戏开服表 版权所有 | 联系我们：2653920258</p>
        <p>免责声明：本网站内容仅供参考，具体以游戏实际内容为准</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api';
    let allAds = [];

    document.addEventListener('DOMContentLoaded', () => {
      loadAds();
    });

    async function loadAds() {
      try {
        ['top-yellow-list', 'white-area-list', 'orange-area-list', 'green-area-list'].forEach(areaId => {
          document.getElementById(areaId).innerHTML = 
            '<tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>';
        });

        const response = await fetch(`${API_BASE_URL}/ads?page=1&pageSize=100`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include'
        });

        if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);
        const result = await response.json();

        if (result.code !== 200 || !Array.isArray(result.data?.list)) {
          throw new Error('数据格式错误，预期数组类型');
        }
        
        allAds = result.data.list;
        renderAdsByArea();

      } catch (error) {
        console.error('加载失败:', error);
        const errorMsg = error.message || '未知错误';
        ['top-yellow-list', 'white-area-list', 'orange-area-list', 'green-area-list'].forEach(areaId => {
          document.getElementById(areaId).innerHTML = 
            `<tr><td colspan="6" style="color: red;">加载失败: ${errorMsg}</td></tr>`;
        });
      }
    }

    function renderAdsByArea() {
      const adsByArea = {
        'top_yellow': [],
        'white_area': [],
        'orange_area': [],
        'green_area': []
      };

      allAds.forEach(ad => {
        if (typeof ad === 'object' && ad !== null && adsByArea.hasOwnProperty(ad.area)) {
          adsByArea[ad.area].push(ad);
        }
      });

      renderFullAreaAds('top-yellow-list', adsByArea.top_yellow);
      renderFullAreaAds('white-area-list', adsByArea.white_area);
      renderFullAreaAds('orange-area-list', adsByArea.orange_area);
      renderFullAreaAds('green-area-list', adsByArea.green_area);
    }

    function renderFullAreaAds(areaId, ads) {
      const tbody = document.getElementById(areaId);
      
      if (!tbody) {
        console.error(`未找到ID为${areaId}的元素`);
        return;
      }
      
      if (!Array.isArray(ads) || ads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
        return;
      }

      ads.sort((a, b) => {
        const dateA = a.open_time ? new Date(a.open_time).getTime() : 0;
        const dateB = b.open_time ? new Date(b.open_time).getTime() : 0;
        return dateB - dateA;
      });
      
      tbody.innerHTML = ads.map(ad => {
        let featureHtml = ad.feature || '';
        if (typeof featureHtml === 'string') {
          featureHtml = featureHtml.replace(/【([^】]+)】/g, (match, text) => {
            const tagColor = ad.tagColor || '#000'; 
            return `<span class="tag" style="color: ${tagColor}">【${text}】</span>`;
          });
        }

        const isExpired = ad.expired || (ad.expire_time && new Date(ad.expire_time) < new Date());
        
        return `
          <tr ${isExpired ? 'style="opacity: 0.6;"' : ''}>
            <td class="col-15">
              <span class="server-name" style="color: ${ad.serverNameColor || '#000080'}">
                ${ad.server_name || '未命名'}
              </span>
            </td>
            <td class="col-15" style="color: ${ad.timeColor || '#000'}">
              ${formatDateTime(ad.open_time)}
              ${isExpired ? '<span style="color: red; margin-left: 5px;">(已过期)</span>' : ''}
            </td>
            <td class="col-42">${featureHtml}</td>
            <td class="col-8" style="color: ${ad.expColor || '#000'}">${ad.exp_rate || '-'}</td>
            <td class="col-10" style="color: ${ad.versionColor || '#000'}">${ad.version || '-'}</td>
            <td class="col-10">
              <a href="${ad.homepage || '#'}" target="_blank" 
                 class="btn-enter" 
                 style="color: ${ad.linkTextColor || 'white'}">
                点击查看
              </a>
            </td>
          </tr>
        `;
      }).join('');
    }

    function formatDateTime(dateString) {
      if (!dateString || typeof dateString !== 'string') return '未知时间';
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
          return dateString;
        }
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        console.error('日期格式化错误:', e);
        return dateString;
      }
    }
  </script>
</body>
</html>
