<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>游戏开服表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 样式保持不变 */
    .table-cols .col-15 { width: 15%; }
    .table-cols .col-42 { width: 42%; }
    .table-cols .col-8 { width: 8%; }
    .table-cols .col-10 { width: 10%; }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SimHei", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    
    body {
      background-color: #2e220a;
      color: #333;
      line-height: 1.5;
    }
    
    a {
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    .btn-enter {
      display: inline-block;
      padding: 2px 6px;
      background-color: #FF6600;
      color: white;
      text-decoration: none;
      border-radius: 2px;
      font-size: 12px;
      font-family: "SimSun", serif;
      border: 1px solid #E55A00;
      font-weight: normal;
    }
    
    .btn-enter:hover {
      background-color: #FF8800;
      color: white;
      text-decoration: none;
    }
    
    .loading {
      text-align: center;
      color: #666;
      padding: 10px;
      font-family: "SimSun", serif;
      font-size: 12px;
      font-weight: normal;
    }
    
    .container-1200 {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 0;
    }
    
    .ad-container {
      padding: 0;
      border: 1px solid #ddd;
    }
    
    .top-info {
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-bottom: none;
      padding: 8px 0;
      text-align: center;
    }
    
    .top-info p {
      color: #333;
      font-weight: bold;
    }
    
    .top-banner {
      background-color: #FFFFFF;
      background-image: url('top-banner.jpg');
      background-size: cover;
      background-position: center;
      border: 1px solid #ddd;
      border-top: none;
      padding: 40px 0;
      min-height: 120px;
    }
    
    .ad-section {
      width: 100%;
      padding: 0;
      border: none;
    }
    
    .section-title {
      color: #C00;
      font-weight: bold;
      padding: 5px 8px;
      font-size: 15px;
      background-color: #FFF0F0;
      border-bottom: 1px solid #FFCCCC;
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    
    .top-yellow {
      background-color: #FFFFE0;
    }
    
    .white-area {
      background-color: #FFFFFF;
    }
    
    .orange-area {
      background-color: #FFF8E0;
    }
    
    .green-area {
      background-color: #E8F5E9;
    }
    
    .server-table {
      width: 100%;
      border-collapse: collapse;
      border: none;
      table-layout: fixed;
    }
    
    .full-table th,
    .full-table td {
      padding: 5px 8px;
      text-align: center;
      border: 1px solid #ddd;
      overflow: visible;
      text-overflow: clip;
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
      line-height: 1.5;
    }
    
    .full-table td.col-42 {
      white-space: nowrap;
    }
    
    .full-table th {
      background: url(../images1/qq.jpg);
      color: #A84200;
      font-weight: bold !important;
      white-space: nowrap;
    }
    
    .top-yellow .full-table tr {
      background-color: #FFFF00;
    }
    
    .white-area .full-table tr {
      background-color: #FFFFFF;
    }
    
    .orange-area .full-table tr {
      background-color: #FFFF00;
    }
    
    .green-area .full-table tr {
      background-color: #d6ff52;
    }
    
    .top-yellow .full-table tr:hover {
      background-color: #B0E0E6;
    }
    
    .white-area .full-table tr:hover,
    .orange-area .full-table tr:hover,
    .green-area .full-table tr:hover {
      background-color: #ffccff;
    }
    
    .server-name {
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    .feature-text {
      color: #FF0000 !important;
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    .recommendation-tag {
      margin-left: 5px;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    .white-area .recommendation-tag { color: #000000; }
    .orange-area .recommendation-tag { color: #FF9900; }
    .green-area .recommendation-tag { color: #009966; }
    .top-yellow .recommendation-tag { color: #FF0000; }
    
    .bottom-banner {
      background-color: #FFFFFF;
      border: 1px solid #ddd;
      border-top: none;
      padding: 10px 0;
      text-align: center;
    }
    
    .bottom-text {
      font-size: 12px;
      color: #666;
      padding: 10px;
    }

    @media (max-width: 1000px) {
      .container-1200 {
        padding: 0;
      }
      
      .top-banner {
        padding: 20px 0;
      }
      
      .section-title {
        font-size: 14px;
      }
    }

    .white-area .section-title,
    .orange-area .section-title,
    .green-area .section-title {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container-1200">
    <div class="top-info">
      <p>制作联系QQ: 2653920258 | 奇迹游戏开服表 | 每日更新最新开服信息</p>
    </div>

    <div class="top-banner"></div>

    <div class="ad-container">
      <!-- 黄色区域 -->
      <div class="ad-section top-yellow">
        <div class="section-title">↓以下为本站强力推荐(20条)长久稳定品牌大区→</div>
        <table class="server-table full-table table-cols">
          <thead>
            <tr>
              <th class="col-15">服务器名</th>
              <th class="col-15">开机时间</th>
              <th class="col-42">游戏版本特色介绍</th>
              <th class="col-8">经验</th>
              <th class="col-10">版本</th>
              <th class="col-10">游戏主页</th>
            </tr>
          </thead>
          <tbody id="top-yellow-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 白色区域 -->
      <div class="ad-section white-area">
        <div class="section-title">白色区域服务器列表</div>
        <table class="server-table full-table table-cols">
          <tbody id="white-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 橙色区域 -->
      <div class="ad-section orange-area">
        <div class="section-title">橙色区域服务器列表</div>
        <table class="server-table full-table table-cols">
          <tbody id="orange-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 绿色区域 -->
      <div class="ad-section green-area">
        <div class="section-title">绿色区域服务器列表</div>
        <table class="server-table full-table table-cols">
          <tbody id="green-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="bottom-banner">
      <div class="bottom-text">
        <p>© 2023 游戏开服表 版权所有 | 联系我们：2653920258</p>
        <p>免责声明：本网站内容仅供参考，具体以游戏实际内容为准</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api';
    let allAds = [];
    
    // 区域推荐文本映射
    const AREA_RECOMMEND_TEXTS = {
      'top_yellow': '品牌强力推荐',
      'white_area': '套白强力推荐',
      'orange_area': '套黄强力推荐',
      'green_area': '套青强力推荐'
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadAds();
      
      // 5秒超时显示模拟数据
      setTimeout(() => {
        const loadingElements = document.querySelectorAll('.loading');
        loadingElements.forEach(el => {
          if (el.textContent.includes('加载中')) {
            loadMockData();
          }
        });
      }, 5000);
    });

    async function loadAds() {
      try {
        // 重置所有区域为加载中状态
        ['top-yellow-list', 'white-area-list', 'orange-area-list', 'green-area-list'].forEach(areaId => {
          document.getElementById(areaId).innerHTML = 
            '<tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>';
        });

        // 1. 修复：移除多余的page参数，后端不支持分页
        const response = await fetch(`${API_BASE_URL}/ads`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include'
        });

        if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);
        
        // 2. 修复：后端直接返回广告数组，无需解析code和data
        const ads = await response.json();

        // 验证是否为数组
        if (!Array.isArray(ads)) {
          throw new Error('数据格式错误，预期数组类型');
        }
        
        allAds = ads;
        renderAdsByArea();

      } catch (error) {
        console.error('加载广告失败:', error);
        // 错误时显示模拟数据
        loadMockData();
      }
    }

    function renderAdsByArea() {
      const adsByArea = {
        'top_yellow': [],
        'white_area': [],
        'orange_area': [],
        'green_area': []
      };

      // 过滤并分类广告
      allAds.forEach(ad => {
        // 3. 修复：使用后端实际返回的字段（area、expire_time等）
        if (typeof ad === 'object' && ad !== null && adsByArea.hasOwnProperty(ad.area)) {
          // 检查广告是否过期（使用后端返回的expire_time）
          const isExpired = ad.expire_time ? new Date(ad.expire_time) < new Date() : false;
          if (!isExpired) {
            adsByArea[ad.area].push(ad);
          }
        }
      });

      // 为所有广告添加推荐标记
      Object.keys(adsByArea).forEach(area => {
        adsByArea[area] = adsByArea[area].map(ad => ({
          ...ad,
          isRecommended: true
        }));
      });

      // 渲染各区域广告
      renderFullAreaAds('top-yellow-list', adsByArea.top_yellow, 'top_yellow');
      renderFullAreaAds('white-area-list', adsByArea.white_area, 'white_area');
      renderFullAreaAds('orange-area-list', adsByArea.orange_area, 'orange_area');
      renderFullAreaAds('green-area-list', adsByArea.green_area, 'green_area');
    }

    function renderFullAreaAds(areaId, ads, areaType) {
      const tbody = document.getElementById(areaId);
      
      if (!tbody) {
        console.error(`未找到ID为${areaId}的元素`);
        return;
      }
      
      if (!Array.isArray(ads) || ads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
        return;
      }

      // 按开服时间排序（最新的在前）
      ads.sort((a, b) => {
        const dateA = a.open_time ? new Date(a.open_time).getTime() : 0;
        const dateB = b.open_time ? new Date(b.open_time).getTime() : 0;
        return dateB - dateA;
      });
      
      const recommendText = AREA_RECOMMEND_TEXTS[areaType] || '强力推荐';
      
      tbody.innerHTML = ads.map(ad => {
        const featureHtml = `<span class="feature-text">${ad.feature || ''}</span>`;
        const formattedTime = formatDateTime(ad.open_time);
        const timeHtml = ad.isRecommended 
          ? `${formattedTime}<span class="recommendation-tag">${recommendText}</span>`
          : formattedTime;

        return `
          <tr>
            <td class="col-15">
              <span class="server-name" style="color: #000080">
                ${ad.server_name || '未命名'}
              </span>
            </td>
            <td class="col-15" style="color: #000;">
              ${timeHtml}
            </td>
            <td class="col-42">${featureHtml}</td>
            <td class="col-8" style="color: #000;">${ad.exp_rate || '-'}</td>
            <td class="col-10" style="color: #000;">${ad.version || '-'}</td>
            <td class="col-10">
              <a href="${ad.homepage || '#'}" target="_blank" class="btn-enter">
                点击查看
              </a>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 日期格式化（修复时间解析问题）
    function formatDateTime(dateString) {
      if (!dateString || typeof dateString !== 'string') return '未知时间';
      try {
        // 处理数据库返回的时间格式（如"2023-08-16 12:00:00"）
        const date = new Date(dateString.replace(' ', 'T'));
        if (isNaN(date.getTime())) {
          return dateString;
        }
        return `${date.getMonth() + 1}月${date.getDate()}日`;
      } catch (e) {
        console.error('日期格式化错误:', e);
        return dateString;
      }
    }

    // 模拟数据加载（保持不变）
    function loadMockData() {
      const now = new Date();
      const mockData = {
        'top_yellow': [
          {
            server_name: "奇迹1区",
            open_time: now.toISOString(),
            feature: "▄【10/11/12】▄【纯正S6老品牌新服】▄【不售任何装备】▄【商人月入过万】▄",
            exp_rate: "10倍",
            version: "经典版",
            homepage: "#",
            area: "top_yellow"
          }
        ],
        'white_area': [
          {
            server_name: "奇迹3区",
            open_time: new Date(now.getTime() - 7200000).toISOString(),
            feature: "▄【新区开放】▄【多重福利】▄【公平竞技】▄【长期稳定】▄",
            exp_rate: "8倍",
            version: "加强版",
            homepage: "#",
            area: "white_area"
          }
        ],
        'orange_area': [
          {
            server_name: "奇迹4区",
            open_time: new Date(now.getTime() - 10800000).toISOString(),
            feature: "▄【独家版本】▄【稳定运营】▄【玩家至上】▄【无套路】▄",
            exp_rate: "15倍",
            version: "变态版",
            homepage: "#",
            area: "orange_area"
          }
        ],
        'green_area': [
          {
            server_name: "奇迹5区",
            open_time: new Date(now.getTime() - 14400000).toISOString(),
            feature: "【公益服务器】【无任何收费】【公平公正】【长期开放】",
            exp_rate: "3倍",
            version: "纯净版",
            homepage: "#",
            area: "green_area"
          }
        ]
      };
      
      // 转换为扁平数组，模拟后端返回格式
      const mockAds = [
        ...mockData.top_yellow,
        ...mockData.white_area,
        ...mockData.orange_area,
        ...mockData.green_area
      ];
      
      allAds = mockAds;
      renderAdsByArea();
    }
  </script>
</body>
</html>
