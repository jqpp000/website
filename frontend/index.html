<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>游戏开服表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 核心：统一列宽定义，所有表格共用 */
    .table-cols .col-15 { width: 15%; }   /* 服务器名/开机时间 */
    .table-cols .col-42 { width: 42%; }   /* 游戏版本特色介绍 */
    .table-cols .col-8 { width: 8%; }     /* 经验 */
    .table-cols .col-10 { width: 10%; }   /* 版本/游戏主页 */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SimHei", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    
    body {
      background-color: #2e220a; /* 表格外容器背景色 - 深棕色 */
      color: #333;
      line-height: 1.5;
    }
    
    a {
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    .btn-enter {
      display: inline-block;
      padding: 2px 6px;
      background-color: #FF6600;
      color: white;
      text-decoration: none;
      border-radius: 2px;
      font-size: 12px;
      font-family: "SimSun", serif;
      border: 1px solid #E55A00;
      font-weight: normal;
    }
    
    .btn-enter:hover {
      background-color: #FF8800;
      color: white;
      text-decoration: none;
    }
    
    .loading {
      text-align: center;
      color: #666;
      padding: 10px;
      font-family: "SimSun", serif;
      font-size: 12px;
      font-weight: normal;
    }
    
    .container-1200 {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 0; /* 移除内边距，避免宽度计算问题 */
    }
    
    .ad-container {
      padding: 0;
      border: 1px solid #ddd; /* 合并边框为单一边框 */
      overflow-x: auto;
    }
    
    .top-info {
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-bottom: none;
      padding: 8px 0;
      text-align: center;
    }
    
    .top-info p {
      color: #333;
      font-weight: bold;
    }
    
    .top-banner {
      background-color: #FFFFFF;
      background-image: url('top-banner.jpg');
      background-size: cover;
      background-position: center;
      border: 1px solid #ddd;
      border-top: none;
      padding: 40px 0;
      min-height: 120px;
    }
    
    .ad-section {
      width: 100%;
      padding: 0;
      border: none;
    }
    
    /* 标题与表格对齐样式 */
    .section-title {
      color: #C00;
      font-weight: bold;
      padding: 5px 8px;
      font-size: 15px;
      background-color: #FFF0F0;
      border-bottom: 1px solid #FFCCCC;
      margin: 0;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* 区域背景色定义 */
    .top-yellow {
      background-color: #FFFFE0;
    }
    
    .white-area {
      background-color: #FFFFFF;
    }
    
    .orange-area {
      background-color: #FFF8E0;
    }
    
    .green-area {
      background-color: #E8F5E9;
    }
    
    /* 所有表格共用相同样式 */
    .server-table {
      width: 100%;
      min-width: 1000px;
      border-collapse: collapse;
      table-layout: fixed;
      border: none; /* 移除表格自身边框，使用容器边框 */
    }
    
    .full-table th,
    .full-table td {
      padding: 5px 8px; /* 增加内边距 */
      text-align: center;
      border: 1px solid #ddd;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
      line-height: 1.5; /* 调整行高 */
    }
    
    /* 游戏版本特色介绍列特殊样式 - 允许换行 */
    .full-table td.col-42 {
      white-space: normal; /* 允许文本换行 */
      height: auto; /* 自动调整高度 */
      text-align: left; /* 左对齐便于阅读 */
    }
    
    /* 表头样式 */
    .full-table th {
      background: url(../images1/qq.jpg);
      color: #A84200;
      font-weight: bold !important;
      white-space: nowrap; /* 表头不换行 */
    }
    
    /* 行背景色和鼠标悬停效果 */
    .top-yellow .full-table tr {
      background-color: #FFFF00;
    }
    
    .white-area .full-table tr {
      background-color: #FFFFFF;
    }
    
    .orange-area .full-table tr {
      background-color: #FFFF00;
    }
    
    .green-area .full-table tr {
      background-color: #d6ff52;
    }
    
    /* 鼠标悬停效果 */
    .top-yellow .full-table tr:hover {
      background-color: #B0E0E6;
    }
    
    .white-area .full-table tr:hover,
    .orange-area .full-table tr:hover,
    .green-area .full-table tr:hover {
      background-color: #ffccff;
    }
    
    .server-name {
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    /* 移除标签美化效果 */
    .feature-text {
      color: #FF0000 !important; /* 使用品牌强力推荐的红色作为主要颜色 */
      font-family: "SimSun", serif !important;
      font-size: 12px !important;
      font-weight: normal !important;
    }
    
    /* 推荐标签样式 - 移除加粗，根据区域设置不同颜色 */
    .recommendation-tag {
      margin-left: 5px;
      font-size: 12px !important;
      font-weight: normal !important; /* 确保不加粗 */
    }
    
    /* 各区域推荐标签颜色 */
    .white-area .recommendation-tag { color: #000000; } /* 白区黑色 */
    .orange-area .recommendation-tag { color: #FF9900; } /* 橙区橙色 */
    .green-area .recommendation-tag { color: #009966; } /* 绿区青色/绿色 */
    .top-yellow .recommendation-tag { color: #FF0000; } /* 黄区红色 */
    
    .bottom-banner {
      background-color: #FFFFFF;
      border: 1px solid #ddd;
      border-top: none;
      padding: 10px 0;
      text-align: center;
    }
    
    .bottom-text {
      font-size: 12px;
      color: #666;
      padding: 10px;
    }

    /* 优化响应式行为 */
    @media (max-width: 1000px) {
      .container-1200 {
        padding: 0;
      }
      
      .top-banner {
        padding: 20px 0;
      }
      
      .section-title {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container-1200">
    <div class="top-info">
      <p>制作联系QQ: 2653920258 | 奇迹游戏开服表 | 每日更新最新开服信息</p>
    </div>

    <div class="top-banner"></div>

    <div class="ad-container">
      <!-- 01广告区域 - 黄色区域 -->
      <div class="ad-section top-yellow">
        <div class="section-title">↓以下为本站强力推荐(20条)长久稳定品牌大区→</div>
        <table class="server-table full-table table-cols">
          <thead>
            <tr>
              <th class="col-15">服务器名</th>
              <th class="col-15">开机时间</th>
              <th class="col-42">游戏版本特色介绍</th>
              <th class="col-8">经验</th>
              <th class="col-10">版本</th>
              <th class="col-10">游戏主页</th>
            </tr>
          </thead>
          <tbody id="top-yellow-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 02广告区域 - 白色区域 -->
      <div class="ad-section white-area">
        <table class="server-table full-table table-cols">
          <tbody id="white-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 03广告区域 - 橙色区域 -->
      <div class="ad-section orange-area">
        <table class="server-table full-table table-cols">
          <tbody id="orange-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 04广告区域 - 绿色区域 -->
      <div class="ad-section green-area">
        <table class="server-table full-table table-cols">
          <tbody id="green-area-list">
            <tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="bottom-banner">
      <div class="bottom-text">
        <p>© 2023 游戏开服表 版权所有 | 联系我们：2653920258</p>
        <p>免责声明：本网站内容仅供参考，具体以游戏实际内容为准</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api';
    let allAds = [];
    
    // 定义各区域的推荐文本
    const AREA_RECOMMEND_TEXTS = {
      'top_yellow': '品牌强力推荐',
      'white_area': '套白强力推荐',
      'orange_area': '套黄强力推荐',
      'green_area': '套青强力推荐'
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadAds();
      
      // 5秒超时显示模拟数据
      setTimeout(() => {
        const loadingElements = document.querySelectorAll('.loading');
        loadingElements.forEach(el => {
          if (el.textContent.includes('加载中')) {
            loadMockData();
          }
        });
      }, 5000);
    });

    async function loadAds() {
      try {
        ['top-yellow-list', 'white-area-list', 'orange-area-list', 'green-area-list'].forEach(areaId => {
          document.getElementById(areaId).innerHTML = 
            '<tr><td colspan="6" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>';
        });

        const response = await fetch(`${API_BASE_URL}/ads?page=1&pageSize=100`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include'
        });

        if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);
        const result = await response.json();

        if (result.code !== 200 || !Array.isArray(result.data?.list)) {
          throw new Error('数据格式错误，预期数组类型');
        }
        
        allAds = result.data.list;
        renderAdsByArea();

      } catch (error) {
        console.error('加载失败，使用模拟数据:', error);
        loadMockData();
      }
    }

    function renderAdsByArea() {
      const adsByArea = {
        'top_yellow': [],
        'white_area': [],
        'orange_area': [],
        'green_area': []
      };

      // 过滤掉已过期的广告
      allAds.forEach(ad => {
        if (typeof ad === 'object' && ad !== null && adsByArea.hasOwnProperty(ad.area)) {
          // 检查广告是否过期
          const isExpired = ad.expired || (ad.expire_time && new Date(ad.expire_time) < new Date());
          // 只添加未过期的广告
          if (!isExpired) {
            adsByArea[ad.area].push(ad);
          }
        }
      });

      // 为所有区域添加推荐标记
      Object.keys(adsByArea).forEach(area => {
        adsByArea[area] = adsByArea[area].map(ad => ({
          ...ad,
          isRecommended: true // 标记为推荐广告
        }));
      });

      renderFullAreaAds('top-yellow-list', adsByArea.top_yellow, 'top_yellow');
      renderFullAreaAds('white-area-list', adsByArea.white_area, 'white_area');
      renderFullAreaAds('orange-area-list', adsByArea.orange_area, 'orange_area');
      renderFullAreaAds('green-area-list', adsByArea.green_area, 'green_area');
    }

    function renderFullAreaAds(areaId, ads, areaType) {
      const tbody = document.getElementById(areaId);
      
      if (!tbody) {
        console.error(`未找到ID为${areaId}的元素`);
        return;
      }
      
      if (!Array.isArray(ads) || ads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
        return;
      }

      ads.sort((a, b) => {
        const dateA = a.open_time ? new Date(a.open_time).getTime() : 0;
        const dateB = b.open_time ? new Date(b.open_time).getTime() : 0;
        return dateB - dateA;
      });
      
      // 获取当前区域的推荐文本
      const recommendText = AREA_RECOMMEND_TEXTS[areaType] || '强力推荐';
      
      tbody.innerHTML = ads.map(ad => {
        // 移除特色介绍的所有美化效果，保持原始文本
        const featureHtml = `<span class="feature-text">${ad.feature || ''}</span>`;

        // 格式化时间，添加推荐标签
        const formattedTime = formatDateTime(ad.open_time);
        const timeHtml = ad.isRecommended 
          ? `${formattedTime}<span class="recommendation-tag">${recommendText}</span>`
          : formattedTime;

        return `
          <tr>
            <td class="col-15">
              <span class="server-name" style="color: ${ad.serverNameColor || '#000080'}">
                ${ad.server_name || '未命名'}
              </span>
            </td>
            <td class="col-15" style="color: ${ad.timeColor || '#000'}">
              ${timeHtml}
            </td>
            <td class="col-42">${featureHtml}</td>
            <td class="col-8" style="color: ${ad.expColor || '#000'}">${ad.exp_rate || '-'}</td>
            <td class="col-10" style="color: ${ad.versionColor || '#000'}">${ad.version || '-'}</td>
            <td class="col-10">
              <a href="${ad.homepage || '#'}" target="_blank" 
                 class="btn-enter" 
                 style="color: ${ad.linkTextColor || 'white'}">
                点击查看
              </a>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 日期格式化函数，只显示月和日
    function formatDateTime(dateString) {
      if (!dateString || typeof dateString !== 'string') return '未知时间';
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
          return dateString;
        }
        // 只显示月和日，格式如：8月14日
        return `${date.getMonth() + 1}月${date.getDate()}日`;
      } catch (e) {
        console.error('日期格式化错误:', e);
        return dateString;
      }
    }

    // 模拟数据加载 - 添加了完整的特色介绍示例
    function loadMockData() {
      const now = new Date();
      const mockData = {
        'top_yellow': [
          {
            server_name: "奇迹1区",
            open_time: now.toISOString(),
            feature: "▄【10/11/12】▄【纯正S6老品牌新服】▄【不售任何装备】▄【商人月入过万】▄",
            exp_rate: "10倍",
            version: "经典版",
            homepage: "#",
            serverNameColor: "#000080",
            isRecommended: true
          },
          {
            server_name: "奇迹2区",
            open_time: new Date(now.getTime() - 3600000).toISOString(),
            feature: "【人气火爆】【福利多】【全新玩法】【全天活动】",
            exp_rate: "5倍",
            version: "怀旧版",
            homepage: "#",
            isRecommended: true
          }
        ],
        'white_area': [
          {
            server_name: "奇迹3区",
            open_time: new Date(now.getTime() - 7200000).toISOString(),
            feature: "▄【新区开放】▄【多重福利】▄【公平竞技】▄【长期稳定】▄",
            exp_rate: "8倍",
            version: "加强版",
            homepage: "#",
            isRecommended: true
          },
          {
            server_name: "奇迹6区",
            open_time: new Date(now.getTime() - 1800000).toISOString(),
            feature: "【独家玩法】【全新地图】【装备靠打】【自由交易】",
            exp_rate: "6倍",
            version: "革新版",
            homepage: "#",
            isRecommended: true
          }
        ],
        'orange_area': [
          {
            server_name: "奇迹4区",
            open_time: new Date(now.getTime() - 10800000).toISOString(),
            feature: "▄【独家版本】▄【稳定运营】▄【玩家至上】▄【无套路】▄",
            exp_rate: "15倍",
            version: "变态版",
            homepage: "#",
            isRecommended: true
          }
        ],
        'green_area': [
          {
            server_name: "奇迹5区",
            open_time: new Date(now.getTime() - 14400000).toISOString(),
            feature: "【公益服务器】【无任何收费】【公平公正】【长期开放】",
            exp_rate: "3倍",
            version: "纯净版",
            homepage: "#",
            isRecommended: true
          },
          {
            server_name: "奇迹7区",
            open_time: new Date(now.getTime() - 21600000).toISOString(),
            feature: "▄【低消费】▄【高回报】▄【新手扶持】▄【每日活动】▄",
            exp_rate: "4倍",
            version: "公益服",
            homepage: "#",
            isRecommended: true
          }
        ]
      };
      
      renderFullAreaAds('top-yellow-list', mockData.top_yellow, 'top_yellow');
      renderFullAreaAds('white-area-list', mockData.white_area, 'white_area');
      renderFullAreaAds('orange-area-list', mockData.orange_area, 'orange_area');
      renderFullAreaAds('green-area-list', mockData.green_area, 'green_area');
    }
  </script>
</body>
</html>
